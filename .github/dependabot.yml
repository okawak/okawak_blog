version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly

  - package-ecosystem: bun
    directories:
      - "/crates/site/web"
      - "/e2e"
    schedule:
      interval: weekly

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly

  - package-ecosystem: rust-toolchain
    directory: "/"
    schedule:
      interval: weekly
