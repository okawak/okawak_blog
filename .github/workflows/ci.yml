name: Rust CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: rust-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  BUN_VERSION: 1.3.14
  CARGO_LEPTOS_VERSION: 0.3.7

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Prepare Rust toolchain
        run: |
          rustup show
          rustup component add clippy
          rustup target add wasm32-unknown-unknown

      - name: Validate service scripts
        run: |
          bash -n service/update_aws_creds.sh
          bash service/tests/update_aws_creds_test.sh

      - name: Cache Cargo dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-rust-ci-${{ hashFiles('**/Cargo.lock') }}

      - name: Test workspace
        run: cargo test --workspace

      - name: Lint workspace
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Check web SSR
        run: cargo check -p web --features ssr

      - name: Check web hydration
        run: cargo check -p web --lib --target wasm32-unknown-unknown --features hydrate

  browser-e2e:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Prepare Rust toolchain
        run: rustup target add wasm32-unknown-unknown

      - name: Cache Cargo dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/bin/cargo-leptos
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-browser-e2e-${{ env.CARGO_LEPTOS_VERSION }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install cargo-leptos
        run: |
          if ! cargo leptos --version 2>/dev/null | grep -q "cargo-leptos ${CARGO_LEPTOS_VERSION}$"; then
            cargo install cargo-leptos --version "${CARGO_LEPTOS_VERSION}" --locked
          fi

      - name: Install web dependencies
        working-directory: crates/site/web
        run: bun install --frozen-lockfile

      - name: Install E2E dependencies
        working-directory: e2e
        run: bun install --frozen-lockfile

      - name: Install Chromium
        working-directory: e2e
        run: bunx playwright install --with-deps chromium

      - name: Run fixture browser E2E
        working-directory: e2e
        run: bun run test

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-fixture-traces
          path: e2e/test-results/
          if-no-files-found: ignore
          retention-days: 7
