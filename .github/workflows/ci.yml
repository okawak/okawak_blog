name: Rust CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: rust-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Prepare Rust toolchain
        run: |
          rustup show
          rustup component add clippy
          rustup target add wasm32-unknown-unknown

      - name: Validate service scripts
        run: |
          bash -n service/update_aws_creds.sh
          bash service/tests/update_aws_creds_test.sh

      - name: Cache Cargo dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-rust-ci-${{ hashFiles('**/Cargo.lock') }}

      - name: Test workspace
        run: cargo test --workspace

      - name: Lint workspace
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Check web SSR
        run: cargo check -p web --features ssr

      - name: Check web hydration
        run: cargo check -p web --lib --target wasm32-unknown-unknown --features hydrate
