name: Publish Obsidian to S3

on:
  workflow_dispatch:

concurrency:
  group: artifact-publication-${{ github.repository }}
  queue: max
  cancel-in-progress: false

env:
  MISE_LOCKED: "1"
  RUST_BACKTRACE: 1
  UPLOAD_PATH: crates/publish/publisher/dist/site

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      id-token: write
      contents: read

    steps:
      - name: Validate publication ref
        run: |
          set -euo pipefail
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "::error::Artifact publication must run from main (got ${GITHUB_REF})."
            exit 1
          fi

      - name: Verify latest main and successful CI
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          latest_main_sha="$(gh api \
            "repos/${GITHUB_REPOSITORY}/git/ref/heads/main" \
            --jq '.object.sha')"

          if [ "$GITHUB_SHA" != "$latest_main_sha" ]; then
            echo "::error::Refusing to publish stale run ${GITHUB_SHA}; latest main is ${latest_main_sha}."
            exit 1
          fi

          ci_run_id="$(gh api --method GET \
            "repos/${GITHUB_REPOSITORY}/actions/workflows/ci.yml/runs" \
            -f branch=main \
            -f event=push \
            -f status=success \
            -f head_sha="$GITHUB_SHA" \
            -f per_page=1 \
            --jq '.workflow_runs[0].id // empty')"

          if [ -z "$ci_run_id" ]; then
            echo "::error::No successful Rust CI push run found for ${GITHUB_SHA}."
            exit 1
          fi

          echo "Validated Rust CI run ${ci_run_id} for ${GITHUB_SHA}."

      - name: Get App Token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: >-
            okawak_blog,
            obsidian

      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          token: ${{ steps.app-token.outputs.token }}
          submodules: recursive
          fetch-depth: 1

      - name: Update submodules
        run: |
          git submodule sync --recursive
          git submodule update --recursive --remote

      - name: Set up shared build tools
        uses: jdx/mise-action@v4

      - name: Check tool version consistency
        run: mise run versions-check

      - name: Install OpenSSL and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install pkg-config libssl-dev

      - name: Cargo cache
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-upload-${{ hashFiles('mise.toml', 'mise.lock', '**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-browser-e2e-${{ hashFiles('mise.toml', 'mise.lock', '**/Cargo.lock') }}
            ${{ runner.os }}-rust-ci-${{ hashFiles('**/Cargo.lock') }}
            ${{ runner.os }}-browser-e2e-
            ${{ runner.os }}-rust-ci-
            ${{ runner.os }}-cargo-

      - name: Generate and validate artifacts
        run: |
          set -euo pipefail
          RUST_LOG=info cargo run --release -p publisher

          if [ ! -d "${{ env.UPLOAD_PATH }}" ]; then
            echo "❌ Output directory not found"
            exit 1
          fi

          test -s "${{ env.UPLOAD_PATH }}/articles/index.json"
          test -s "${{ env.UPLOAD_PATH }}/metadata/site.json"

          file_count=$(find "${{ env.UPLOAD_PATH }}/articles" -name "*.html" -type f | wc -l | tr -d ' ')
          if [ "$file_count" -eq 0 ]; then
            echo "❌ No article HTML files were generated"
            exit 1
          fi

          echo "✅ Validated ${file_count} article HTML files"

      - name: Build release pointer
        run: |
          set -euo pipefail
          source_commit=$(git -C crates/publish/publisher/obsidian rev-parse HEAD)
          release_id="${GITHUB_SHA:0:12}-${source_commit:0:12}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          artifact_prefix="releases/${release_id}/site"

          jq -n \
            --argjson schema_version 1 \
            --arg release_id "$release_id" \
            --arg artifact_prefix "$artifact_prefix" \
            --arg publisher_commit "$GITHUB_SHA" \
            --arg source_commit "$source_commit" \
            --arg generated_at "$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            '{schema_version: $schema_version, release_id: $release_id, artifact_prefix: $artifact_prefix, publisher_commit: $publisher_commit, source_commit: $source_commit, generated_at: $generated_at}' \
            > "$RUNNER_TEMP/release.json"

          echo "RELEASE_ID=$release_id" >> "$GITHUB_ENV"
          echo "ARTIFACT_PREFIX=$artifact_prefix" >> "$GITHUB_ENV"

      - name: Validate AWS secrets
        run: |
          if [ -z "${{ secrets.AWS_REGION }}" ] || [ -z "${{ secrets.AWS_ACCOUNT_ID }}" ] || [ -z "${{ secrets.AWS_ROLE_NAME }}" ] || [ -z "${{ secrets.S3_BUCKET }}" ]; then
            echo "Error: Required AWS secrets are missing"
            echo "Required: AWS_REGION, AWS_ACCOUNT_ID, AWS_ROLE_NAME, S3_BUCKET"
            exit 1
          fi
          echo "✅ All required AWS secrets are present"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_ROLE_NAME }}

      - name: Install web dependencies
        run: mise run web-install

      - name: Upload and validate immutable release
        run: |
          set -euo pipefail
          release_uri="s3://${{ secrets.S3_BUCKET }}/${ARTIFACT_PREFIX}"

          aws s3 sync "${{ env.UPLOAD_PATH }}" "$release_uri" \
            --cache-control "public, max-age=31536000, immutable"

          local_html_count=$(find "${{ env.UPLOAD_PATH }}" -name "*.html" -type f | wc -l | tr -d ' ')
          remote_html_count=$(aws s3 ls "$release_uri/" --recursive | awk '/\.html$/ { count++ } END { print count + 0 }')
          if [ "$remote_html_count" -ne "$local_html_count" ]; then
            echo "❌ Release validation failed: local=${local_html_count}, remote=${remote_html_count}"
            exit 1
          fi

          aws s3 cp "$RUNNER_TEMP/release.json" \
            "s3://${{ secrets.S3_BUCKET }}/releases/${RELEASE_ID}/manifest.json" \
            --content-type "application/json" \
            --cache-control "public, max-age=31536000, immutable"

          echo "REMOTE_HTML_COUNT=$remote_html_count" >> "$GITHUB_ENV"

      - name: Run browser smoke test against immutable release
        env:
          CI: "true"
          OKAWAK_BLOG_ARTIFACT_BUCKET: ${{ secrets.S3_BUCKET }}
          PLAYWRIGHT_INSTALL_WITH_DEPS: "true"
        run: OKAWAK_BLOG_ARTIFACT_PREFIX="$ARTIFACT_PREFIX" mise run test-e2e-s3

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-s3-traces
          path: e2e/test-results/s3/
          if-no-files-found: ignore
          retention-days: 7

      - name: Verify publication is based on latest main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          latest_main_sha="$(gh api \
            "repos/${GITHUB_REPOSITORY}/git/ref/heads/main" \
            --jq '.object.sha')"

          if [ "$GITHUB_SHA" != "$latest_main_sha" ]; then
            echo "::error::Refusing to publish stale run ${GITHUB_SHA}; latest main is ${latest_main_sha}."
            exit 1
          fi

      - name: Switch release pointer
        run: |
          set -euo pipefail

          # current.json is updated last. Readers either see the previous complete
          # release or this complete release, never an in-place partial upload.
          aws s3 cp "$RUNNER_TEMP/release.json" \
            "s3://${{ secrets.S3_BUCKET }}/current.json" \
            --content-type "application/json" \
            --cache-control "no-store"

          echo "🪣 Published release ${RELEASE_ID} with ${REMOTE_HTML_COUNT} HTML files"

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Deployment failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔧 Troubleshooting" >> $GITHUB_STEP_SUMMARY
          echo "Please check the logs above for detailed error information." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Common issues:" >> $GITHUB_STEP_SUMMARY
          echo "- Submodule update failures" >> $GITHUB_STEP_SUMMARY
          echo "- AWS credentials or permissions" >> $GITHUB_STEP_SUMMARY
          echo "- Artifact generation or browser smoke failures" >> $GITHUB_STEP_SUMMARY
          echo "- S3 sync issues" >> $GITHUB_STEP_SUMMARY
